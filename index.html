  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0d1b2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card {
      text-align: center;
      padding: 0 24px;
      animation: fadeIn 0.8s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 12px;
    }
    .logo-icon { width: 56px; height: 56px; }
    .logo-text {
      font-size: 2rem;
      font-weight: 700;
      color: #e8edf5;
      letter-spacing: 0.1em;
    }

    .tagline {
      font-size: 0.85rem;
      color: #7a9cc4;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    /* Progress ring */
    .ring-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      position: relative;
    }
    .ring {
      transform: rotate(-90deg);
    }
    .ring-track {
      fill: none;
      stroke: rgba(255,255,255,0.07);
      stroke-width: 4;
    }
    .ring-fill {
      fill: none;
      stroke: url(#ringGrad);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 201;   /* 2π×32 ≈ 201 */
      stroke-dashoffset: 201;
      animation: ring 3s linear forwards;
    }
    @keyframes ring {
      to { stroke-dashoffset: 0; }
    }
    .ring-count {
      position: absolute;
      font-size: 1.1rem;
      font-weight: 600;
      color: #e8edf5;
      letter-spacing: 0.04em;
    }

    .hint {
      font-size: 0.8rem;
      color: #4a6a8a;
      margin-bottom: 32px;
      letter-spacing: 0.06em;
    }

    /* Manual button (shown if redirect fails) */
    .btn {
      display: inline-block;
      padding: 12px 36px;
      background: linear-gradient(135deg, #1a3a6c, #2566ad);
      color: #e8edf5;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      border-radius: 8px;
      text-decoration: none;
      border: 1px solid rgba(79,163,224,0.3);
      transition: opacity 0.2s;
      opacity: 0;
      animation: showBtn 0.4s ease 3.2s forwards;
    }
    .btn:hover { opacity: 0.85; }
    @keyframes showBtn {
      to { opacity: 1; }
    }

    /* Divider dots */
    .dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 24px;
    }
    .dots span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #2566ad;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="logo-wrap">
      <svg class="logo-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1a3a6c"/>
            <stop offset="100%" stop-color="#2566ad"/>
          </linearGradient>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#2566ad"/>
            <stop offset="100%" stop-color="#4fa3e0"/>
          </linearGradient>
        </defs>
        <path d="M32 4L10 12v20c0 12.4 9.3 23.9 22 28 12.7-4.1 22-15.6 22-28V12z" fill="url(#lg)"/>
        <path d="M24 32 l5 5 11-12" stroke="#ffd" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="32" y="56" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#ffd" text-anchor="middle">DPM</text>
      </svg>
      <div class="logo-text">DPM</div>
    </div>

    <p class="tagline">Credit Default Predictor</p>

    <!-- Countdown ring -->
    <div class="ring-wrap">
      <svg class="ring" width="80" height="80" viewBox="0 0 80 80">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#2566ad"/>
            <stop offset="100%" stop-color="#4fa3e0"/>
          </linearGradient>
        </defs>
        <circle class="ring-track" cx="40" cy="40" r="32"/>
        <circle class="ring-fill"  cx="40" cy="40" r="32"/>
      </svg>
      <span class="ring-count" id="count">3</span>
    </div>

    <div class="dots">
      <span></span><span></span><span></span>
    </div>

    <p class="hint" id="hint">正在喚醒風險評估引擎…</p>

    <a class="btn"
       href="https://celtic29-yc-default-predictor.hf.space/login/"
       id="manualBtn">立即進入系統 →</a>

  </div>

  <script>
    const TARGET  = 'https://celtic29-yc-default-predictor.hf.space/login/';
    const countEl = document.getElementById('count');
    const hintEl  = document.getElementById('hint');

    const MSGS = [
      '正在喚醒風險評估引擎…',
      '模型載入中，請稍候…',
      '初次啟動約需 20–30 秒，感謝耐心等待…',
      '即將就緒，馬上跳轉…',
    ];
    const MAX_WAIT  = 30000;  // 最多等 30 秒
    const MIN_WAIT  =  5000;  // 最少等 5 秒（避免太快跳轉）
    const POLL_INT  =  3000;  // 每 3 秒 ping 一次
    const start     = Date.now();
    let   elapsed   = 0;
    let   redirected = false;

    function doRedirect() {
      if (redirected) return;
      redirected = true;
      window.location.href = TARGET;
    }

    // Update hint message as time passes
    setInterval(() => {
      elapsed = Date.now() - start;
      const idx = Math.min(Math.floor(elapsed / 7000), MSGS.length - 1);
      hintEl.textContent = MSGS[idx];
      // Update ring countdown display (counts up to show progress)
      const pct = Math.min(elapsed / MAX_WAIT, 1);
      countEl.textContent = Math.ceil((MAX_WAIT - elapsed) / 1000);
    }, 1000);

    // Poll HF Space — redirect as soon as it responds (or after MIN_WAIT)
    function ping() {
      fetch(TARGET, { mode: 'no-cors', cache: 'no-store' })
        .then(() => {
          const waited = Date.now() - start;
          const remaining = Math.max(MIN_WAIT - waited, 0);
          setTimeout(doRedirect, remaining);
        })
        .catch(() => {
          // Still waking up — retry unless max wait exceeded
          const waited = Date.now() - start;
          if (waited < MAX_WAIT) {
            setTimeout(ping, POLL_INT);
          } else {
            doRedirect(); // Give up waiting, try anyway
          }
        });
    }

    // Force redirect after MAX_WAIT regardless
    setTimeout(doRedirect, MAX_WAIT);

    // Start pinging after 2 s
    setTimeout(ping, 2000);
  </script>

</body>
